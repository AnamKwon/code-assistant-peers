<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">code-assistant-peers architecture</title>
  <desc id="desc">Architecture diagram showing MCP clients, code-assistant-peers server, peer reviewer CLIs, SQLite review memory, git diff context, and optional semantic context providers such as Serena.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .core { fill: #eef2ff; stroke: #6366f1; stroke-width: 2; }
      .store { fill: #ecfdf5; stroke: #10b981; stroke-width: 2; }
      .warn { fill: #fff7ed; stroke: #f97316; stroke-width: 2; }
      .future { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 2; stroke-dasharray: 8 6; }
      .text { fill: #0f172a; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #475569; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { font-size: 13px; }
      .small { font-size: 15px; }
      .label { font-size: 18px; font-weight: 700; }
      .title { font-size: 25px; font-weight: 800; }
      .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 6; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
  </defs>

  <rect class="bg" width="1120" height="720" />

  <text class="text title" x="40" y="48">mcp-code-assistant-peers architecture</text>
  <text class="muted small" x="40" y="76">Local MCP review gate for CLI coding agents. The host edits; peer assistants review; findings persist across rounds.</text>

  <rect class="panel" x="40" y="120" width="230" height="145" rx="14" />
  <text class="text label" x="64" y="154">MCP clients</text>
  <text class="muted small" x="64" y="184">Claude Code</text>
  <text class="muted small" x="64" y="210">OpenAI Codex</text>
  <text class="muted tiny" x="64" y="238">Calls MCP tools over stdio</text>

  <rect class="core" x="360" y="104" width="400" height="220" rx="14" />
  <text class="text label" x="388" y="140">code-assistant-peers MCP server</text>
  <text class="muted small" x="388" y="174">begin_peer_task</text>
  <text class="muted small" x="388" y="200">must_call_after_code_changes</text>
  <text class="muted small" x="388" y="226">request_peer_review / async review</text>
  <text class="muted small" x="388" y="252">normal / adversarial / gate / collaborative</text>
  <text class="muted small" x="388" y="278">review_only / peer_fix</text>
  <text class="muted tiny" x="388" y="304">Builds prompts, starts reviewers, stores rounds</text>

  <rect class="panel" x="850" y="120" width="230" height="170" rx="14" />
  <text class="text label" x="878" y="154">Reviewer CLIs</text>
  <text class="muted small" x="878" y="184">Claude print mode</text>
  <text class="muted small" x="878" y="210">Codex read-only exec</text>
  <text class="muted small" x="878" y="236">Gemini / GLM / DeepSeek</text>
  <text class="muted tiny" x="878" y="264">Custom adapters via stdin or argv</text>

  <rect class="store" x="96" y="410" width="270" height="165" rx="14" />
  <text class="text label" x="124" y="444">SQLite review memory</text>
  <text class="muted small" x="124" y="474">Tasks and status</text>
  <text class="muted small" x="124" y="500">Review rounds</text>
  <text class="muted small" x="124" y="526">Structured findings</text>
  <text class="muted small" x="124" y="552">Compacted history</text>

  <rect class="warn" x="430" y="410" width="260" height="165" rx="14" />
  <text class="text label" x="458" y="444">Review context</text>
  <text class="muted small" x="458" y="474">Git status and diff</text>
  <text class="muted small" x="458" y="500">Changed files</text>
  <text class="muted small" x="458" y="526">Baseline dirty warning</text>
  <text class="muted small" x="458" y="552">Focus and mode hints</text>

  <rect class="future" x="760" y="410" width="280" height="165" rx="14" />
  <text class="text label" x="788" y="444">Optional semantic context</text>
  <text class="muted small" x="788" y="474">Serena MCP / LSP</text>
  <text class="muted small" x="788" y="500">Changed symbols</text>
  <text class="muted small" x="788" y="526">References / implementations</text>
  <text class="muted tiny" x="788" y="552">Future provider, fallback to git diff</text>

  <rect class="panel" x="360" y="620" width="400" height="58" rx="14" />
  <text class="text label" x="386" y="654">Final response gate</text>
  <text class="muted tiny" x="586" y="654">Report review result, fix blocking findings, then answer</text>

  <path class="arrow" d="M270 192 H348" />
  <text class="muted tiny" x="286" y="178">MCP tool calls</text>

  <path class="arrow" d="M760 192 H838" />
  <text class="muted tiny" x="780" y="178">review prompt</text>

  <path class="arrow" d="M850 252 C790 332 716 332 664 324" />
  <text class="muted tiny" x="716" y="356">review output</text>

  <path class="arrow" d="M500 324 C430 372 350 395 280 410" />
  <text class="muted tiny" x="318" y="378">persist</text>

  <path class="arrow" d="M560 324 V398" />
  <text class="muted tiny" x="576" y="365">diff/context</text>

  <path class="arrow dash" d="M690 492 H748" />
  <text class="muted tiny" x="692" y="480">optional</text>

  <path class="arrow" d="M560 575 V608" />
  <text class="muted tiny" x="578" y="598">gate result</text>

  <text class="muted tiny" x="40" y="696">Collaborative mode: peer reviewer runs first, then host-side comparison reviewer merges and challenges findings. peer_fix proposes patches but does not edit files.</text>
</svg>
